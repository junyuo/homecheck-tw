name: Update static data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 19 1 * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run data pipeline
        run: npm run update-data
      - name: Validate website with last-good data
        run: npm run build
      - name: Commit only validated changes
        run: |
          if git diff --quiet -- public/data; then
            echo "No validated data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "data: update validated static datasets"
          git push
