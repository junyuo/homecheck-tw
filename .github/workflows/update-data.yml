name: Update static data

on:
  workflow_dispatch:
    inputs:
      source:
        description: Data source to update
        required: true
        default: all
        type: choice
        options:
          - all
          - price
          - risks
          - transport
          - facilities
          - market
          - accidents
      dryRun:
        description: Validate without publishing data files
        required: true
        default: false
        type: boolean
  schedule:
    # 08:17 Asia/Taipei on the 2nd, 12th and 22nd.
    - cron: '17 0 2,12,22 * *'
    # 09:17 Asia/Taipei on the 3rd for risk metadata and hashes.
    - cron: '17 1 3 * *'
    # 09:17 Asia/Taipei on the 4th for metro, bus and rail.
    - cron: '17 1 4 * *'
    # 09:17 Asia/Taipei on the 5th for parking, hospitals, schools, parks and libraries.
    - cron: '17 1 5 * *'
    # 09:17 Asia/Taipei on the 6th for A1/A2 accident metadata and hashes.
    - cron: '17 1 6 * *'
    # 09:17 Asia/Taipei on the 7th for traditional retail markets.
    - cron: '17 1 7 * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Select scheduled source
        id: scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "source=${{ inputs.source }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "17 1 3 * *" ]; then
            echo "source=risks" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "17 1 4 * *" ]; then
            echo "source=transport" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "17 1 5 * *" ]; then
            echo "source=facilities" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "17 1 6 * *" ]; then
            echo "source=accidents" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "17 1 7 * *" ]; then
            echo "source=market" >> "$GITHUB_OUTPUT"
          else
            echo "source=price" >> "$GITHUB_OUTPUT"
          fi
      - name: Install GDAL for spatial datasets
        if: steps.scope.outputs.source == 'risks' || steps.scope.outputs.source == 'all'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gdal-bin
          ogr2ogr --version
      - run: npm ci
      - name: Run data pipeline
        run: npm run update-data
        env:
          DATA_SOURCE: ${{ steps.scope.outputs.source }}
          DRY_RUN: ${{ inputs.dryRun || 'false' }}
      - name: Validate website with last-good data
        run: npm run build
      - name: Commit only validated changes
        run: |
          if git diff --quiet -- public/data; then
            echo "No validated data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "data: update validated static datasets"
          git push
